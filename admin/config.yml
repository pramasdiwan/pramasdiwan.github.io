backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME   # ← replace with e.g. pramasdiwan/pramasdiwan.github.io
  branch: main
  base_url: https://pramasdiwan.github.io      # ← replace with your actual GitHub Pages URL
  auth_endpoint: api/auth

# Where uploaded images/files get stored in the repo
media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

# ── COLLECTIONS ─────────────────────────────────────────────────────────────
collections:

  # ── BLOG POSTS ─────────────────────────────────────────────────────────────
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    sortable_fields: ["date", "title", "category"]
    summary: "{{title}} — {{category}} ({{date}})"
    fields:

      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Keep under 60 characters for best SEO. Include your main keyword."

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD MMM YYYY"
        time_format: false
        default: ""

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Fat Loss"
          - "Women's Fitness"
          - "Calisthenics"
          - "Mobility"
          - "Nutrition"
          - "Healthy Habits"

      - label: "Excerpt / Meta Description"
        name: "excerpt"
        widget: "text"
        hint: "Shown on the blog index and used as the meta description. Aim for 140–160 characters. Include the target keyword naturally."

      - label: "Read Time"
        name: "read_time"
        widget: "string"
        default: "5 min read"

      - label: "Featured Image"
        name: "featured_image"
        widget: "image"
        required: false
        hint: "Recommended: 1200×630 px JPEG for blog header and Open Graph sharing."

      - label: "Featured Image Alt Text"
        name: "featured_image_alt"
        widget: "string"
        required: false
        hint: "Describe the image for screen readers and SEO. E.g. 'Woman doing calisthenics at home'"

      # ── SEO FIELDS ────────────────────────────────────────────────────────
      - label: "SEO"
        name: "seo"
        widget: "object"
        collapsed: true
        hint: "Optional overrides. If blank, title and excerpt are used automatically."
        fields:
          - label: "SEO Title"
            name: "meta_title"
            widget: "string"
            required: false
            hint: "If different from the post title. Under 60 characters. End with | Pramas Diwan"
          - label: "SEO Description"
            name: "meta_description"
            widget: "text"
            required: false
            hint: "If different from the excerpt. 140–160 characters."
          - label: "Focus Keyword"
            name: "focus_keyword"
            widget: "string"
            required: false
            hint: "The single main keyword this article targets. E.g. 'belly fat loss for women'"
          - label: "Canonical URL"
            name: "canonical"
            widget: "string"
            required: false
            hint: "Only set if this content is republished from elsewhere."
          - label: "No Index"
            name: "noindex"
            widget: "boolean"
            default: false
            required: false
            hint: "Turn on to hide this post from Google (e.g. drafts you want to preview live)."

      - label: "Body Content"
        name: "body"
        widget: "markdown"
        hint: "Write your full article here. Use Heading 2 (##) for main sections, Heading 3 (###) for sub-sections. Include your focus keyword in the first paragraph and at least one H2."

  # ── PROGRAMS (editable descriptions and bullet points) ─────────────────────
  - name: "programs"
    label: "Programs"
    label_singular: "Program"
    folder: "_programs"
    create: false       # Programs are fixed — edit, don't create new ones
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Program Name"
        name: "title"
        widget: "string"
      - label: "Tag / Badge"
        name: "tag"
        widget: "string"
        hint: "E.g. 'Flagship Program', 'Fat Loss', 'Nutrition'"
      - label: "Who It's For"
        name: "for_whom"
        widget: "text"
      - label: "Benefits / Feature List"
        name: "benefits"
        widget: "list"
        label_singular: "Benefit"
        field:
          label: "Benefit"
          name: "benefit"
          widget: "string"
      - label: "Expected Outcome"
        name: "outcome"
        widget: "text"
      - label: "Is This The Featured Program?"
        name: "featured"
        widget: "boolean"
        default: false

  # ── TESTIMONIALS ────────────────────────────────────────────────────────────
  - name: "testimonials"
    label: "Testimonials"
    label_singular: "Testimonial"
    folder: "_testimonials"
    create: true
    slug: "{{name | slugify}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{name}} — {{result}}"
    fields:
      - label: "Client Name"
        name: "name"
        widget: "string"
      - label: "Role / Description"
        name: "role"
        widget: "string"
        hint: "E.g. 'Lost 7 kg in 12 weeks · Working Mother, Pune'"
      - label: "Result Summary"
        name: "result"
        widget: "string"
        hint: "Short result used in cards. E.g. 'Lost 7 kg in 12 weeks'"
      - label: "Quote"
        name: "quote"
        widget: "text"
      - label: "Show On Homepage?"
        name: "homepage"
        widget: "boolean"
        default: true
      - label: "Video URL"
        name: "video_url"
        widget: "string"
        required: false
        hint: "YouTube or Vimeo embed URL if this is a video testimonial"
      - label: "Client Photo"
        name: "photo"
        widget: "image"
        required: false

  # ── SITE SETTINGS ────────────────────────────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:

      - label: "Contact & Business Info"
        name: "contact"
        file: "_data/contact.yml"
        fields:
          - label: "WhatsApp Number"
            name: "whatsapp"
            widget: "string"
            hint: "International format without + or spaces. E.g. 919876543210"
          - label: "Display Phone"
            name: "phone_display"
            widget: "string"
            hint: "E.g. +91 98765 43210"
          - label: "Email"
            name: "email"
            widget: "string"
          - label: "Instagram Handle"
            name: "instagram_handle"
            widget: "string"
            hint: "Include the @. E.g. @pramasdiwan.fit"
          - label: "Instagram URL"
            name: "instagram_url"
            widget: "string"
          - label: "Business Hours"
            name: "business_hours"
            widget: "string"
            default: "Mon–Sat, 7:00 AM – 8:00 PM IST"
          - label: "Location / Service Area"
            name: "location"
            widget: "string"
            default: "Online Coaching — Serving Clients Pan-India"

      - label: "SEO & Social Defaults"
        name: "seo"
        file: "_data/seo.yml"
        fields:
          - label: "Site Name"
            name: "site_name"
            widget: "string"
            default: "Pramas Diwan"
          - label: "Default Meta Description"
            name: "default_description"
            widget: "text"
          - label: "Default OG Image"
            name: "og_image"
            widget: "image"
            hint: "1200×630 px JPEG. Used when a page has no specific image."
          - label: "Google Analytics ID"
            name: "ga_id"
            widget: "string"
            required: false
            hint: "E.g. G-XXXXXXXXXX — leave blank if not using GA"
          - label: "Google Search Console Verification"
            name: "gsc_verification"
            widget: "string"
            required: false
            hint: "The content value from the GSC verification meta tag"
